# Enable deep sleep support to turn off the radio when you aren't typing
CONFIG_ZMK_SLEEP=y

# Deep sleep after 5 minutes of total inactivity (5 * 60 * 1000 milliseconds)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000

# Supercharge the Bluetooth signal strength so you get zero latency or drops
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y




